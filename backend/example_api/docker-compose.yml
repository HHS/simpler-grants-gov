services:
  example-db:
    image: postgres:17.5-alpine
    container_name: example-db
    command: postgres -c "log_lock_waits=on" -N 1000 -c "fsync=off" -p 5439
    env_file: ./local.env
    ports:
      - "5439:5439"
    volumes:
      - exampledbdata:/var/lib/postgresql/data


  example-api:
    build:
      context: .
      target: dev
      args:
        - RUN_UID=${RUN_UID:-4000}
        - RUN_USER=${RUN_USER:-api}
    command:
      [
        "flask",
        "--app",
        "src.app",
        "run",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        "--reload",
      ]
    container_name: example-api
    env_file:
      - path: ./local.env
        required: true
      - path: ./override.env
        required: false
    ports:
      - 8080:8080
    volumes:
      - .:/api


volumes:
  exampledbdata: