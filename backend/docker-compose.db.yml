services:
  grants-db:
    image: postgres:17.5-alpine
    container_name: grants-db
    command: postgres -c "log_lock_waits=on" -N 1000 -c "fsync=off"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret123
      POSTGRES_MULTIPLE_DATABASES: "app,app:analytics,analytics:grants_shared,grants_shared:grants_management,grants_management"
    ports:
      - "5432:5432"
    volumes:
      - grantsdbdata:/var/lib/postgresql/data
      - ./scripts/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
    networks:
      - default
      - local_db

networks:
  local_db:
    name: local_db

volumes:
  grantsdbdata: