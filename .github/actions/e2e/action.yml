name: Run Playwright
description: Composite action to run Playwright against specified environment

# ---
# This action conditionally installs Playwright browsers (Chrome, Firefox, WebKit)
# based on the do-chrome-install, do-firefox-install, and do-webkit-install inputs.
# Only the browsers needed for the current test shard are installed, improving CI efficiency.
# Chrome is cached outside this job, and will be available even if not instructed to install.
# ---

inputs:
  version:
    description: "ref / sha / branch to run tests against"
    required: true
  target:
    description: "application environment to run tests against (dev / prod TK)"
    required: true
    default: "local"
  staging_test_user_email:
    description: "email for staging test user"
  staging_test_user_password:
    description: "password for staging test user"
  staging_test_user_mfa_key:
    description: "mfa key for staging test user"
  playwright_tags:
    description: "pipe separated list of tags denoting groups of tests to run"
  total_shards:
    description: "total number of test shards in parent run"
    default: "1"
  current_shard:
    description: "current shard number in parent run"
    default: "1"
  needs_node_setup:
    description: "does this action need to set up node and install deps"
    default: "true"
  api_logs:
    description: "print api logs on failure?"
    default: "false"
  node_version:
    description: "node version"
    default: "24"
  package_manager:
    description: "node dependency package manager"
    default: "npm"
  lockfile_path:
    description: "path to package manage lockfile"
    default: "./frontend/package-lock.json"
  node_options:
    description: "options to pass to node"
    default: "--dns-result-order=ipv4first"
  workers:
    description: "number of workers to use for test run"
    default: ""
  do-chrome-install:
    description: "install chrome for playwright"
    default: "false"
  do-firefox-install:
    description: "install firefox for playwright"
    default: "false"
  do-webkit-install:
    description: "install webkit for playwright"
    default: "false"
  staging_test_user_api_key:
    description: "test user API key used in spoofing staging user logins"
    default: ""
  staging_test_user_manager_api_key:
    description: "manager API key used to request auth tokens for test users via POST /v1/internal/e2e-token"
    default: ""
  staging_test_user_id:
    description: "UUID of the staging test user whose token will be requested for login spoofing"
    default: ""
  staging_client_session_secret:
    description: "encode key for client side JWTs, used in spoofing staging user logins"
    default: ""

outputs:
  artifact-id:
    description: "artifact ids for uploaded test reports"
    value: ${{ steps.upload-blob-report.outputs.artifact-id }}

runs:
  using: "composite"
  steps:
    - name: Validate environment
      shell: bash
      env:
        PLAYWRIGHT_TARGET_ENV: ${{ inputs.target }}
      run: |
        if [[ $PLAYWRIGHT_TARGET_ENV != "local" && $PLAYWRIGHT_TARGET_ENV != "staging" ]]; then echo "invalid e2e test target provided" && exit 1; fi

    - name: Check out code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.version }}
        clean: false

    - name: Set up Node
      if: ${{ inputs.needs_node_setup == 'true' }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node_version }}
        cache: ${{ inputs.package_manager }}
        cache-dependency-path: ${{ inputs.lockfile_path }}

    - name: Install Playwright core package
      if: ${{ inputs.needs_node_setup == 'true' }}
      shell: bash
      working-directory: ./frontend
      run: |
        npm install @playwright/test

    # Conditionally install Chrome if requested
    - name: Install Chrome and dependencies
      if: ${{ inputs.do-chrome-install == 'true' }}
      shell: bash
      working-directory: ./frontend
      run: |
        npx playwright install --with-deps chromium-headless-shell

    # Conditionally install Firefox if requested (Shard 2 on the CI/CD run)
    - name: Install Firefox and dependencies
      if: ${{ inputs.do-firefox-install == 'true' }}
      shell: bash
      working-directory: ./frontend
      run: |
        npx playwright install --with-deps firefox

    # Conditionally install Webkit if requested (Shard 3 on the CI/CD run)
    - name: Install Webkit and dependencies
      if: ${{ inputs.do-webkit-install == 'true' }}
      shell: bash
      working-directory: ./frontend
      run: |
        npx playwright install --with-deps webkit

    - name: Run all e2e tests (Shard ${{ inputs.current_shard }}/${{ inputs.total_shards }})
      if: ${{ inputs.playwright_tags == '' }}
      working-directory: ./frontend
      env:
        CI: true
        TOTAL_SHARDS: ${{ inputs.total_shards }}
        CURRENT_SHARD: ${{ inputs.current_shard }}
        PLAYWRIGHT_TARGET_ENV: ${{ inputs.target }}
        PLAYWRIGHT_WORKERS: ${{ inputs.workers }}
        STAGING_TEST_USER_EMAIL: ${{ inputs.staging_test_user_email }}
        STAGING_TEST_USER_PASSWORD: ${{ inputs.staging_test_user_password }}
        STAGING_TEST_USER_MFA_KEY: ${{ inputs.staging_test_user_mfa_key }}
        STAGING_TEST_USER_API_KEY: ${{ inputs.staging_test_user_api_key }}
        STAGING_TEST_USER_MANAGER_API_KEY: ${{ inputs.staging_test_user_manager_api_key }}
        STAGING_TEST_USER_ID: ${{ inputs.staging_test_user_id }}
        SESSION_SECRET_OVERRIDE: ${{ inputs.staging_client_session_secret }}

      run: |
        npm run test:e2e
      shell: bash

    - name: Run e2e tests for ${{ inputs.playwright_tags }} (Shard ${{ inputs.current_shard }}/${{ inputs.total_shards }})
      if: ${{ inputs.playwright_tags != '' }}
      working-directory: ./frontend
      env:
        CI: true
        TOTAL_SHARDS: ${{ inputs.total_shards }}
        CURRENT_SHARD: ${{ inputs.current_shard }}
        PLAYWRIGHT_TARGET_ENV: ${{ inputs.target }}
        PLAYWRIGHT_WORKERS: ${{ inputs.workers }}
        STAGING_TEST_USER_EMAIL: ${{ inputs.staging_test_user_email }}
        STAGING_TEST_USER_PASSWORD: ${{ inputs.staging_test_user_password }}
        STAGING_TEST_USER_MFA_KEY: ${{ inputs.staging_test_user_mfa_key }}
        STAGING_TEST_USER_API_KEY: ${{ inputs.staging_test_user_api_key }}
        STAGING_TEST_USER_MANAGER_API_KEY: ${{ inputs.staging_test_user_manager_api_key }}
        STAGING_TEST_USER_ID: ${{ inputs.staging_test_user_id }}
        SESSION_SECRET_OVERRIDE: ${{ inputs.staging_client_session_secret }}

      run: |
        npm run test:e2e -- --grep "${{ inputs.playwright_tags }}"
      shell: bash

    - name: Debug logging on failure
      if: ${{ failure() && inputs.api_logs == 'true' }}
      working-directory: ./frontend
      run: |
        cd ../api
        echo "=== API Container Logs ==="
        docker logs grants-api || echo "Could not retrieve API logs"
        echo ""
        echo "=== OpenSearch Container Logs ==="
        docker logs opensearch-node || echo "Could not retrieve OpenSearch logs"
        echo ""
        echo "=== Container Status ==="
        docker ps -a
        echo ""
        echo "=== Disk free ==="
        df -h
        echo ""
      shell: bash

    - name: Verify Blob Report Directory
      working-directory: ./frontend
      run: |
        echo "Contents of blob-report directory:"
        ls -R blob-report || echo "blob-report directory not found"
      shell: bash

    - name: Upload Blob Report
      id: upload-blob-report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: blob-report-shard-${{ inputs.target }}-${{ inputs.current_shard }}
        path: /home/runner/work/simpler-grants-gov/simpler-grants-gov/frontend/blob-report
        retention-days: 1
