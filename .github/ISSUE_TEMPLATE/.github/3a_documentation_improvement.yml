name: Documentation Improvement
description: Report outdated, missing, or unclear documentation
labels:
  - documentation
body:
  - type: input
    id: affected_file_or_url
    attributes:
      label: Affected file or URL
      description: Which documentation page, file, or URL needs improvement?
      placeholder: ex. README.md or https://simpler.grants.gov/some/page
    validations:
      required: true

  - type: textarea
    id: current_problem
    attributes:
      label: What is currently wrong or missing
      description: Describe what is outdated, incorrect, broken, or unclear.
      placeholder: Explain what a reader sees now and why it is a problem.
    validations:
      required: true

  - type: textarea
    id: suggested_correction
    attributes:
      label: Suggested correction or addition
      description: What should the documentation say instead?
      placeholder: Share replacement text, missing steps, or a clearer explanation.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/HHS/simpler-grants-gov/blob/main/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
