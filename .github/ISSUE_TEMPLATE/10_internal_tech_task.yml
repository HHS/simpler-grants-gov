name: Internal - Tech Task
description: Engineering implementation work under a user story
type: Task
labels: ["type:tech-task"]
body:
  - type: input
    id: parent_user_story
    attributes:
      label: Parent user story
      description: Link the parent user story issue
      placeholder: "#1234"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear implementation objective for this ticket
    validations:
      required: true

  - type: textarea
    id: implementation_details
    attributes:
      label: Implementation details
      description: Technical approach and scope
      placeholder: |
        Example:
        - Analyze ticket and constraints
        - Add/update user role table
        - Update service/API contracts
    validations:
      required: true

  - type: checkboxes
    id: execution_checklist
    attributes:
      label: Execution checklist
      description: Typical developer workflow for this task
      options:
        - label: Analyze ticket and confirm technical approach
        - label: Implement code changes
        - label: Add or update unit tests
        - label: Open PR and complete code review updates
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Specific technical outcomes and definition of done
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: testing_notes
    attributes:
      label: Testing notes
      description: Local verification steps and links to results
    validations:
      required: false
