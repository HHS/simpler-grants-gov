name: Internal - Test Task
description: Quality engineering work under a user story
type: Task
labels: ["type:test-task"]
body:
  - type: input
    id: parent_user_story
    attributes:
      label: Parent user story
      description: Link the parent user story issue
      placeholder: "#1234"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Test objective and scope for this ticket
    validations:
      required: true

  - type: textarea
    id: tagging
    attributes:
      label: Story tagging
      description: Record the user story key/label used in test artifacts
      placeholder: "story:US-123 or #1234"
    validations:
      required: true

  - type: checkboxes
    id: execution_checklist
    attributes:
      label: Execution checklist
      description: Standard QC flow for story-aligned testing
      options:
        - label: Create or update feature files aligned to acceptance criteria
        - label: Tag feature files/tests with the user story reference
        - label: Complete feature review with product owner and capture feedback
        - label: Create or update automation tests
        - label: Document regression scope for shared component changes
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Test outcomes required before story can move to done
      placeholder: |
        - [ ] Tests mapped to all acceptance criteria
        - [ ] Results recorded and linked
    validations:
      required: true

  - type: textarea
    id: evidence_links
    attributes:
      label: Evidence links
      description: Links to PRs, reports, screenshots, or run results
    validations:
      required: false
