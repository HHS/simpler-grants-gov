## Claim Instructions

To claim this bounty:

1. Read the Contributor Terms of Service linked above.
2. Comment with the acknowledgment text below.
3. After posting the acknowledgment, comment `/claim`.

Acknowledgment text:

```text
I have read and agree to the Simpler Grants Contributor Program Terms of Service. I confirm I am 18 or older, a US citizen, not a current or former Nava or HHS employee or contractor, and not on the OFAC SDN list. I understand that payment requires a merged PR, verification, and W-9 documentation if my cumulative program payments this year will reach $600.
```

Claim notes:

- You may hold up to 3 active bounty claims at a time.
- A claim expires after 14 days with no activity.
- You may request one 7-day extension by commenting with a substantive progress update before the 14-day mark.
- Payment is made only after the pull request is merged, acceptance criteria are met, and eligibility checks are complete.

## Pull Request Requirements

- Link the PR to this issue using `Closes #ISSUE_NUMBER`.
- All CI checks must pass.
- Follow the repository's existing code style and contribution guidelines.
- Add or update tests for new behavior or regressions.
- Update documentation when the change affects contributor or user workflows.
- Do not add new runtime dependencies unless maintainers approve them first.

## Review And Payment

Before merge and payment:

- Two maintainers with merge rights must approve the PR.
- A maintainer must confirm the acceptance criteria with a PR comment that starts with `Acceptance criteria check: PASS`.
- Program operators must complete identity, eligibility, OFAC, and tax-threshold checks.
- If cumulative program payments reach or exceed $600 in the calendar year, a completed W-9 is required before payment.

When multiple valid PRs are submitted for this bounty, the first valid PR by GitHub `opened_at` timestamp receives the bounty. Valid-but-unselected PRs may be eligible for a runner-up courtesy payment while program reserve funds are available.

