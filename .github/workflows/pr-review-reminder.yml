name: PR Review Reminder

on:
  schedule:
    - cron: '0 * * * *'

permissions:
  pull-requests: write
  issues: write

jobs:
  remind-reviewers:
    runs-on: ubuntu-latest
    steps:
      - name: Check for open PRs without reviewers
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'created',
              direction: 'desc',
              per_page: 50
            });

            const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000);

            for (const pr of prs) {
              if (pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) continue;
              if (new Date(pr.created_at) > oneHourAgo) continue;
              if (pr.draft) continue;

              const { data: reviews } = await github.rest.pulls.listRequestedReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              });

              if (reviews.users.length === 0 && reviews.teams.length === 0) {
                const { data: comments } = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number
                });

                const alreadyReminded = comments.some(c =>
                  c.user.type === 'Bot' && c.body.includes('reviewer-reminder-bot')
                );

                if (!alreadyReminded) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number,
                    body: [
                      `<!-- reviewer-reminder-bot -->`,
                      `**Reminder:** This PR has been open for over an hour with no reviewers assigned.`,
                      `Please request a review from the appropriate team member(s) when ready.`
                      `If you are not ready to assign reviewers, please mark the PR as a draft.`,
                    ].join('\n')
                  });
                }
              }
            }
