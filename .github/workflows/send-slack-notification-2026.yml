name: Slack Notification

on:
  push:
    branches: mdragon/9032-e2e-staging-notifications
  workflow_call:
  workflow_dispatch:
    inputs:
      slack_tag:
        description: "List of Slack handles to tag in the message"
        required: false
        type: string
        default: "@Matt Dragon"

jobs:
  send-slack-notification:
    name: Send Slack notification on failure
    runs-on: ubuntu-22.04
    steps:
      - name: Send Slack notification
        run: |
          curl -X POST \
          -H "Content-Type: application/json; charset=utf-8" \
          --data '{
            "text": ":x: *GitHub Actions Failure Alert* ${{ inputs.slack_tag}}",
            "attachments": [
            {
              "color": "#ff0000",
              "title": "Workflow *'"${{ github.workflow }}"'* failed",
              "fields": [
              {
                "title": "Run By",
                "value": "'"${{ github.triggering_actor }}"'"
              },
              {
                "title": "Event Name",
                "value": "'"${{ github.event_name }}"'"
              },
              {
                "title": "Ref Type",
                "value": "'"${{ github.ref_type }}"'"
              },
              {
                "title": "Ref Name",
                "value": "'"${{ github.ref_name }}"'"
              },
              {
                "title": "Workflow URL",
                "value": "'"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"'"
              }
              ],
              "footer": "GitHub Actions",
              "footer_icon": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              "ts": '$(date +%s)'
            }
            ]
          }' "https://hooks.slack.com/services/${{ secrets.SLACK_E2E_ALERTS_HOOK_ID}}"
