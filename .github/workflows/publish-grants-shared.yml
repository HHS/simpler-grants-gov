name: Release Grants Shared Package to PyPi
on:
  workflow_call:

  pull_request: # TODO - remove, just need for testing
    paths:
      - backend/grants_shared/**
      - .github/workflows/publish-grants-shared.yml

defaults:
  run:
    working-directory: ./backend/grants_shared

jobs:
  publish-to-pypi:
    name: Publish grants_shared to PyPi
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get Project Version
        id: get-version
        run: |
          PROJECT_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "grants_shared project version is currently: ${PROJECT_VERSION}"
          echo "project_version=$PROJECT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        run: make build

      # TODO - consider format/lint/test checks to be safe?

      - name: Smoke Test (wheel)
        run: |
          make docker-cmd args="uv run --isolated --with dist/grants_shared-${{steps.get-version.outputs.project_version}}-py3-none-any.whl tests/grants_shared/smoke_test.py"

      - name: Smoke Test (source distribution)
        run: make smoke-test-gz

      # TODO - add uv publish here

      # - name: Release to PyPi
      #   run: make publish-to-pypi