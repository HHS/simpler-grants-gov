name: E2E Tests (Deployed Target)
on:
  schedule:
    # Run every day at (6/7am Eastern) before the start of the workday
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "git reference to deploy (e.g., a branch, tag, or commit SHA)"
        required: true
        type: string
      target:
        description: "application environment to run tests against (dev / prod TK)"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
  pull_request:
    paths:
      - frontend/**
      - .github/workflows/e2e-staging.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Runs E2E Staging non auth test by Tag-based exclusion -@auth is excluded
  e2e-tests-no-auth-sharded:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: true
      matrix:
        shard: [1, 2, 3, 4]
        total_shards: [4]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set target
        run: if [[ -z "${{ inputs.target }}" ]]; then echo "defaulted_target=staging" >> "$GITHUB_ENV"; else echo 'defaulted_target="${{ inputs.target }}"' >> "$GITHUB_ENV"; fi

      - uses: ./.github/actions/e2e
        with:
          version: ${{ inputs.version || github.ref }}
          target: ${{ env.defaulted_target }}
          total_shards: ${{ matrix.total_shards }}
          current_shard: ${{ matrix.shard }}
          staging_test_user_email: ${{ secrets.STAGING_TEST_USER_EMAIL }}
          staging_test_user_password: ${{ secrets.STAGING_TEST_USER_PASSWORD }}
          staging_test_user_mfa_key: ${{ secrets.STAGING_TEST_USER_MFA_KEY }}
          report_name_prefix: blob-report-no-auth
          test_command: >-
            npx playwright test --config ./tests/playwright.config.ts --project=Chrome
            --grep-invert @auth
            tests/e2e
  
  # Runs E2E Staging auth test by Tag-based inclusion -only @auth is included
  e2e-tests-auth-single-worker:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set target
        run: if [[ -z "${{ inputs.target }}" ]]; then echo "defaulted_target=staging" >> "$GITHUB_ENV"; else echo 'defaulted_target="${{ inputs.target }}"' >> "$GITHUB_ENV"; fi

      - uses: ./.github/actions/e2e
        with:
          version: ${{ inputs.version || github.ref }}
          target: ${{ env.defaulted_target }}
          total_shards: 1
          current_shard: 1
          staging_test_user_email: ${{ secrets.STAGING_TEST_USER_EMAIL }}
          staging_test_user_password: ${{ secrets.STAGING_TEST_USER_PASSWORD }}
          staging_test_user_mfa_key: ${{ secrets.STAGING_TEST_USER_MFA_KEY }}
          report_name_prefix: blob-report-auth
          test_command: >-
            npx playwright test --config ./tests/playwright.config.ts --project=Chrome --workers=1
            --grep @auth
            tests/e2e

  create-report:
    name: Create Merged Test Report
    if: ${{ !cancelled() }}
    needs: [e2e-tests-no-auth-sharded, e2e-tests-auth-single-worker]
    uses: ./.github/workflows/e2e-create-report.yml
    secrets: inherit
    with:
      run_id: ${{ github.run_id }}
