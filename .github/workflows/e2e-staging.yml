name: E2E Tests (Deployed Target)
on:
  workflow_dispatch:
    inputs:
      version:
        description: "git reference for testing code to run (e.g., a branch, tag, or commit SHA)"
        required: true
        type: string
      target:
        description: "application environment to run tests against (dev / prod TK)"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
      playwright_tags:
        description: "pipe separated list of @tags denoting groups of tests to run (e.g. @smoke|@core-regression). Leave blank to run all tests"
        type: string
  workflow_call:
    inputs:
      version:
        description: "git reference for testing code to run (e.g., a branch, tag, or commit SHA)"
        required: true
        type: string
      target:
        description: "application environment to run tests against (dev / prod TK)"
        default: "staging"
        type: string
      playwright_tags:
        description: "pipe separated list of @tags denoting groups of tests to run (e.g. @smoke|@core-regression). Leave blank to run all tests"
        type: string
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  e2e-tests-deployed:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set target
        run: if [[ -z "${{ inputs.target }}" ]]; then echo "defaulted_target=staging" >> "$GITHUB_ENV"; else echo "defaulted_target=${{ inputs.target }}" >> "$GITHUB_ENV"; fi
      - name: Determine test groups to run
        shell: bash
        run: |
          if [[ $GITHUB_EVENT_NAME = "push" ]]; then
            echo "test_group_tags=@core-regression" >> "$GITHUB_ENV"
          else
            echo "test_group_tags=${{ inputs.playwright_tags }}" >> "$GITHUB_ENV"
          fi
      - name: Run E2E tests
        uses: ./.github/actions/e2e
        with:
          version: ${{ inputs.version || github.ref }}
          target: ${{ env.defaulted_target }}
          total_shards: 1
          current_shard: 1
          workers: 1
          playwright_tags: ${{ env.test_group_tags }}
          staging_test_user_email: ${{ secrets.STAGING_TEST_USER_EMAIL }}
          staging_test_user_password: ${{ secrets.STAGING_TEST_USER_PASSWORD }}
          staging_test_user_mfa_key: ${{ secrets.STAGING_TEST_USER_MFA_KEY }}
  create-report:
    name: Create Merged Test Report
    if: ${{ !cancelled() }}
    needs: e2e-tests-deployed
    uses: ./.github/workflows/e2e-create-report.yml
    secrets: inherit
    with:
      run_id: ${{ github.run_id }}
  send-slack-notification:
    if: failure()
    needs: [create-report]
    uses: ./.github/workflows/send-slack-notification.yml
    with:
      "channel_id": "alerts-e2e"
    secrets: inherit
