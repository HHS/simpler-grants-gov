name: Analytics Checks

on:
  workflow_call:
    inputs:
      skip_checks:
        type: boolean
        default: false
        description: Skip the guts of this workflow, but we have to run the workflow for dependency reasons when calling from CD workflows
  pull_request:
    paths:
      - analytics/**
      - .github/workflows/ci-analytics.yml

defaults:
  run:
    working-directory: ./analytics

jobs:
  lint-test:
    if: ${{ inputs.skip_checks == null || inputs.skip_checks == false }}
    name: Analytics Lint, Format & Tests
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN_PROJECT_ACCESS }}
      ANALYTICS_SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      ANALYTICS_REPORTING_CHANNEL_ID: ${{ secrets.REPORTING_CHANNEL_ID_TEST }}
      ACTION: show-results # show results, but don't post them to slack
    steps:
      # set up python
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # install poetry
      - uses: Gr1N/setup-poetry@v9

      - name: Install analytics package using poetry
        run: make install

      - name: Check formatters
        run: make format-check

      - name: Run linting
        run: make lint

      - name: Run database migrations
        run: docker compose down --volumes && make db-migrate

      - name: Run tests
        run: make test-audit

      # Both of these tasks are looking for github and slack auth
      # - name: Export GitHub data
      #   run: make gh-data-export

      # - name: Run reports
      #   run: make sprint-reports
  skip-checks:
    if: ${{ inputs.skip_checks != null && inputs.skip_checks == true }}
    name: Skip Checks
    runs-on: ubuntu-22.04
    steps:
      - name: Checks skipped
        working-directory: ./
        run: exit 0
