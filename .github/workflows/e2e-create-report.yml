name: Create Merged Test Report
on:
  workflow_call:
    inputs:
      run_id:
        description: "github actions id for run to grab artifacts from"
        type: string
      target:
        description: "application environment the test was run against"
        default: "local"
        type: string
env:
  NODE_VERSION: 24
  LOCKFILE_PATH: ./frontend/package-lock.json
  PACKAGE_MANAGER: npm
  NODE_OPTIONS: --dns-result-order=ipv4first
defaults:
  run:
    working-directory: ./frontend
jobs:
  e2e-create-report:
    continue-on-error: true
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{ env.PACKAGE_MANAGER }}
          cache-dependency-path: ${{ env.LOCKFILE_PATH }}

      - uses: actions/cache@v5
        id: npm-cache
        with:
          path: |
            ./node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}

      - uses: actions/cache@v5
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      # - name: npm ci
      #   if: steps.npm-cache.outputs.cache-hit != 'true'
      #   run: |
      #     npm ci

      # - name: Install dependencies and Playwright
      #   if: steps.playwright-cache.outputs.cache-hit != 'true'
      #   run: |
      #     npx playwright install --with-deps

      - name: Download All Blob Reports
        uses: actions/download-artifact@v7
        with:
          path: frontend/all-blob-reports
          run-id: ${{ inputs.run_id }}
          pattern: blob-report-shard-${{ inputs.target }}-*
          merge-multiple: true
      - name: Verify Downloaded Artifacts
        run: |
          echo "Contents of all-blob-reports after download:"
          ls -R all-blob-reports*
      - name: Merge Blob Reports into HTML
        run: npx playwright merge-reports --reporter html ./all-blob-reports
      - name: Verify Downloaded Artifacts
        run: |
          echo "Contents of all-blob-reports after download:"
          ls -R playwright*
      - name: Upload Merged HTML Report
        uses: actions/upload-artifact@v7
        with:
          name: merged-html-report-${{ inputs.target }}
          path: frontend/playwright-report
          retention-days: 30
