name: PR Review Assignment Bot

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  assign-reviewers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch (for config files only)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          sparse-checkout: |
            .github/internal-contributors.yml
            .github/external-reviewers.yml
          sparse-checkout-cone-mode: false

      - name: Determine if PR is external or internal
        id: classify
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const author = context.payload.pull_request.user.login.toLowerCase();
            const headRepo = context.payload.pull_request.head.repo.full_name;
            const baseRepo = context.payload.pull_request.base.repo.full_name;
            const isFromFork = headRepo !== baseRepo;

            console.log(`PR #${context.payload.pull_request.number}`);
            console.log(`  Author: ${author}`);
            console.log(`  Head repo: ${headRepo}`);
            console.log(`  Base repo: ${baseRepo}`);
            console.log(`  Is from fork: ${isFromFork}`);

            if (!isFromFork) {
              console.log('  Classification: INTERNAL (same-repo branch)');
              core.setOutput('is_external', 'false');
              core.setOutput('author', author);
              return;
            }

            let internalContributors = [];
            try {
              const raw = fs.readFileSync('.github/internal-contributors.yml', 'utf8');
              const lines = raw.split('\n');
              for (const line of lines) {
                const match = line.match(/^\s*-\s+(\S+)/);
                if (match) {
                  internalContributors.push(match[1].toLowerCase());
                }
              }
            } catch (e) {
              console.log('  Warning: Could not read internal-contributors.yml, treating all fork PRs as external');
            }

            console.log(`  Internal allowlist: [${internalContributors.join(', ')}]`);

            if (internalContributors.includes(author)) {
              console.log('  Classification: INTERNAL (allowlisted contributor using fork)');
              core.setOutput('is_external', 'false');
            } else {
              console.log('  Classification: EXTERNAL (unknown fork contributor)');
              core.setOutput('is_external', 'true');
            }

            core.setOutput('author', author);

      - name: Assign reviewers for external PRs
        if: steps.classify.outputs.is_external == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const prNumber = context.payload.pull_request.number;
            const author = '${{ steps.classify.outputs.author }}';

            let externalReviewers = ['btabaska', 'mdragon', 'KevinJBoyer'];
            try {
              const raw = fs.readFileSync('.github/external-reviewers.yml', 'utf8');
              const lines = raw.split('\n');
              const parsed = [];
              for (const line of lines) {
                const match = line.match(/^\s*-\s+(\S+)/);
                if (match) parsed.push(match[1]);
              }
              if (parsed.length > 0) externalReviewers = parsed;
            } catch (e) {
              console.log('Warning: Could not read external-reviewers.yml, using fallback list');
            }

            const reviewers = externalReviewers.filter(
              r => r.toLowerCase() !== author.toLowerCase()
            );

            console.log(`Assigning reviewers for external PR #${prNumber}: [${reviewers.join(', ')}]`);

            if (reviewers.length > 0) {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers: reviewers
              });
            }

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              assignees: reviewers
            });

            const body = [
              `**Welcome, @${author}!** Thank you for contributing!`,
              ``,
              `This PR has been flagged as an external contribution and the following maintainers have been notified for review:`,
              ``,
              ...reviewers.map(r => `- @${r}`),
              ``,
              `They will review your changes and provide feedback. In the meantime, please make sure:`,
              `- [ ] Your PR description clearly explains the changes`,
              `- [ ] Tests are passing`,
              `- [ ] You've linked the relevant issue (if applicable)`,
              ``,
              `Thank you for helping improve the project!`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });

      - name: Log internal PR (no-op)
        if: steps.classify.outputs.is_external == 'false'
        run: |
          echo "Internal PR #${{ github.event.pull_request.number }} by ${{ steps.classify.outputs.author }} — skipping auto-assignment."
          echo "Author is responsible for requesting reviewers manually."
