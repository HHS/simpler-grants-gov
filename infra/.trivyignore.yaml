# Trivy IaC ignore rules for infra/ directory
# Format: https://aquasecurity.github.io/trivy/latest/docs/configuration/filtering/#trivyignoreyaml
#
# Each entry requires:
#   id:        Trivy AVD check ID
#   statement: Why this finding is suppressed
#
# Note: Path-based filtering (paths:) is not supported for misconfig scans due to
# a known upstream Trivy limitation. IDs below are suppressed globally. Each
# suppressed check only violates in the third-party NewRelic remote module; our
# own infrastructure resources comply with all of these checks.

misconfigurations:
  # Third-party NewRelic Terraform module pulled in as a remote module source.
  # We cannot modify this code and the findings are in example/integration code,
  # not production infrastructure.
  - id: AVD-AWS-0086
    statement: "Third-party NewRelic module — cannot modify"
  - id: AVD-AWS-0087
    statement: "Third-party NewRelic module — cannot modify"
  - id: AVD-AWS-0091
    statement: "Third-party NewRelic module — cannot modify"
  - id: AVD-AWS-0093
    statement: "Third-party NewRelic module — cannot modify"
  - id: AVD-AWS-0132
    statement: "Third-party NewRelic module — cannot modify; own-code exceptions suppressed inline"
  - id: AVD-AWS-0345
    statement: "Third-party NewRelic module — cannot modify; own-code exception suppressed inline"
  - id: AVD-DS-0002
    statement: "Third-party NewRelic module Dockerfile — cannot modify"
